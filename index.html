<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجادة الشكر </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 65vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8E8 100%);
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', Arial, sans-serif;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            max-width: 500px;
            width: 100%;
        }

        .game-title {
            color: #FF6B6B;
            font-size: 56px;
            font-weight: bold;
            text-shadow: 3px 3px 0px #FFA07A;
            letter-spacing: 4px;
        }

        .main-image {
            /* background: white; */
            /* padding: 15px; */
            border-radius: 25px;
            /* box-shadow: 0 8px 0 #999, 0 12px 20px rgba(0, 0, 0, 0.2); */
            max-width: 50%;
            width: 100%;
            transition: transform 0.2s ease;
        }

        .main-image:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #999, 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .main-image img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 15px;
        }

        .main-image-placeholder {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #FFD93D 0%, #FFA07A 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
        }

        .audio-btn {
            background: #FF6B6B;
            border: 5px solid white;
            padding: 0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 8px 0 #CC5555, 0 12px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
        }

        .audio-btn:hover {
            transform: scale(1.1);
        }

        .audio-btn:active {
            transform: translateY(4px) scale(1.05);
            box-shadow: 0 4px 0 #CC5555, 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .audio-btn.playing {
            background: #4ECDC4;
            box-shadow: 0 8px 0 #3BA39C, 0 12px 20px rgba(0, 0, 0, 0.2);
            animation: wiggle 0.5s ease-in-out infinite;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        .audio-btn img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            /* filter: brightness(0) invert(1); */
        }

        .audio-btn-placeholder {
            width: 60px;
            height: 60px;
            color: white;
            font-size: 48px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .audio-counter {
            background: white;
            color: #FF6B6B;
            font-size: 28px;
            font-weight: bold;
            padding: 15px 35px;
            border-radius: 50px;
            box-shadow: 0 6px 0 #E0E0E0, 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        @media (max-width: 768px) {
            .game-title {
                font-size: 42px;
            }

            .audio-btn {
                width: 100px;
                height: 100px;
            }

            .audio-btn img,
            .audio-btn-placeholder {
                width: 50px;
                height: 50px;
            }

            .audio-counter {
                font-size: 24px;
                padding: 12px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-title">سجادة الشكر </div>
        
        <div class="main-image">
            <img src="mat.png" alt="Main Image" onerror="this.parentElement.innerHTML='<div class=\'main-image-placeholder\'>🎵</div>'">
        </div>

        <button class="audio-btn" id="audioBtn">
            <img src="audios.png" alt="Play" onerror="this.parentElement.innerHTML='<div class=\'audio-btn-placeholder\'></div>'">
        </button>

        <!-- <div class="audio-counter" id="counter">Audio 1 of 5</div> -->
    </div>

    <audio id="audio1" src="1.mp3"></audio>
    <audio id="audio2" src="2.mp3"></audio>
    <audio id="audio3" src="3.mp3"></audio>
    <audio id="audio4" src="4.mp3"></audio>
    <audio id="audio5" src="5.mp3"></audio>

    <script>
        let currentAudioIndex = 1;
        const totalAudios = 5;
        let currentAudio = null;
        let isPlaying = false;

        const audioBtn = document.getElementById('audioBtn');
        const counter = document.getElementById('counter');

        function updateDisplay() {
            counter.textContent = `Audio ${currentAudioIndex} of ${totalAudios}`;
        }

        audioBtn.addEventListener('click', function() {
            if (currentAudio && isPlaying) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                audioBtn.classList.remove('playing');
                isPlaying = false;
            }

            currentAudio = document.getElementById('audio' + currentAudioIndex);
            
            currentAudio.play();
            audioBtn.classList.add('playing');
            isPlaying = true;

            currentAudio.onended = () => {
                audioBtn.classList.remove('playing');
                isPlaying = false;
                
                currentAudioIndex++;
                if (currentAudioIndex > totalAudios) {
                    currentAudioIndex = 1;
                }
                updateDisplay();
            };

            currentAudioIndex++;
            if (currentAudioIndex > totalAudios) {
                currentAudioIndex = 1;
            }
            updateDisplay();
        });

        updateDisplay();
    </script>
</body>
</html>
